openapi: "3.0.0"
info:
  title: "Users API"
  version: "1.0.0"
  description: "A simple CRUD API for managing users."
servers:
  - url: /api
paths:
  /users:
    get:
      summary: "Get all users"
      operationId: "api.get_users"
      responses:
        "200":
          description: "A list of users"
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/User"
    post:
      summary: "Create a user"
      operationId: "api.create_user"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
      responses:
        "201":
          description: "User created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{user_id}:
    get:
      summary: "Get a user by ID"
      operationId: "api.get_user"
      parameters:
        - name: "user_id"
          in: "path"
          required: true
          schema:
            type: "integer"
      responses:
        "200":
          description: "A single user"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: "User not found"
    put:
      summary: "Update a user"
      operationId: "api.update_user"
      parameters:
        - name: "user_id"
          in: "path"
          required: true
          schema:
            type: "integer"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
      responses:
        "200":
          description: "User updated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: "User not found"
    delete:
      summary: "Delete a user"
      operationId: "api.delete_user"
      parameters:
        - name: "user_id"
          in: "path"
          required: true
          schema:
            type: "integer"
      responses:
        "204":
          description: "User deleted"
        "404":
          description: "User not found"

components:
  schemas:
    User:
      type: "object"
      required:
        - name
        - email
      properties:
        id:
          type: "integer"
          readOnly: true
        name:
          type: "string"
        email:
          type: "string"
          format: "email"
